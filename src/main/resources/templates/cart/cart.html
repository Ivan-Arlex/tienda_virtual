<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{fragments/nav :: head-includes}"/>
  <title>Mi Carrito – 3Market</title>
</head>
<body>

<th:block th:replace="~{fragments/nav :: navbar}"/>

<div class="container py-4">
  <h3 class="section-title"><i class="bi bi-cart3 me-2"></i>Mi Carrito</h3>

  <div th:if="${success}" class="alert alert-success alert-dismissible fade show py-2">
    <span th:text="${success}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  <div th:if="${error}" class="alert alert-danger alert-dismissible fade show py-2">
    <span th:text="${error}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <div th:if="${cart.items.isEmpty()}" class="text-center py-5">
    <i class="bi bi-cart-x" style="font-size:4rem;color:#cbd5e1"></i>
    <p class="text-muted mt-3">Tu carrito está vacío.</p>
    <a th:href="@{/catalog}" class="btn btn-primary-3m px-4">Ir al catálogo</a>
  </div>

  <div th:unless="${cart.items.isEmpty()}" class="row g-4">
    <div class="col-md-8">
      <div class="panel-card">
        <div class="table-responsive">
          <table class="table align-middle mb-0">
            <thead>
              <tr>
                <th>Producto</th>
                <th class="text-center">Precio</th>
                <th class="text-center">Cantidad</th>
                <th class="text-center">Subtotal</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="item : ${cart.items}">
                <td>
                  <div class="d-flex align-items-center gap-3">
                    <div class="product-img-wrap rounded" style="width:56px;height:56px">
                      <img th:if="${item.productImageUrl != null and !item.productImageUrl.isEmpty()}"
                           th:src="${item.productImageUrl}" alt=""
                           style="max-height:50px;object-fit:contain"/>
                      <i th:unless="${item.productImageUrl != null and !item.productImageUrl.isEmpty()}"
                         class="bi bi-box-seam" style="font-size:1.5rem;color:#cbd5e1"></i>
                    </div>
                    <div>
                      <a th:href="@{/products/{id}(id=${item.productId})}"
                         class="fw-bold text-dark text-decoration-none" style="font-size:.9rem"
                         th:text="${item.productName}"></a>
                      <div class="text-muted" style="font-size:.78rem" th:text="${item.categoryName}"></div>
                    </div>
                  </div>
                </td>
                <td class="text-center"
                    th:text="${'$' + #numbers.formatDecimal(item.productPrice, 1, 2)}"></td>
                <td class="text-center" style="width:120px">
                  <form th:action="@{/cart/update/{id}(id=${item.id})}" method="post">
                    <input type="number" name="quantity" class="form-control form-control-sm text-center"
                           th:value="${item.quantity}" min="1" th:max="${item.availableStock}"
                           onchange="this.form.submit()" style="width:65px;border-radius:8px"/>
                  </form>
                </td>
                <td class="text-center fw-bold price-tag"
                    th:text="${'$' + #numbers.formatDecimal(item.subtotal, 1, 2)}"></td>
                <td>
                  <form th:action="@{/cart/remove/{id}(id=${item.id})}" method="post">
                    <button type="submit" class="btn btn-sm btn-outline-danger" title="Eliminar">
                      <i class="bi bi-trash3"></i>
                    </button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="panel-card">
        <div class="panel-header"><span class="fw-bold">Resumen del pedido</span></div>
        <div class="p-4">
          <div class="d-flex justify-content-between mb-2">
            <span class="text-muted">Subtotal</span>
            <span th:text="${'$' + #numbers.formatDecimal(cart.total, 1, 2)}"></span>
          </div>
          <div class="d-flex justify-content-between mb-3">
            <span class="text-muted">Envío</span>
            <span class="text-success fw-semibold">Gratis</span>
          </div>
          <hr/>
          <div class="d-flex justify-content-between fw-bold fs-5 mb-4">
            <span>Total</span>
            <span class="price-tag"
                  th:text="${'$' + #numbers.formatDecimal(cart.total, 1, 2)}"></span>
          </div>
          <a th:href="@{/orders/checkout}" class="btn btn-auth-primary w-100 text-decoration-none d-block text-center">
            <i class="bi bi-bag-check-fill me-1"></i>Proceder al pago
          </a>
          <a th:href="@{/catalog}" class="btn btn-outline-secondary w-100 mt-2 btn-sm">
            Seguir comprando
          </a>
        </div>
      </div>
    </div>
  </div>
</div>

<footer class="footer-3m">
  <p class="mb-0">© 2026 <strong style="color:var(--teal)">3Market</strong> · Universidad del Pacífico</p>
</footer>

<th:block th:replace="~{fragments/nav :: scripts}"/>
</body>
</html>
