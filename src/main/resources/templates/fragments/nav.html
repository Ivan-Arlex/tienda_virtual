<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" th:href="@{/home}">
      <i class="bi bi-shop"></i> TiendaVirtual
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" th:href="@{/home}">Inicio</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/catalog}">Catálogo</a>
        </li>
      </ul>
      <ul class="navbar-nav ms-auto align-items-center gap-2">
        <sec:authorize access="isAuthenticated()">
          <li class="nav-item">
            <a class="nav-link" th:href="@{/cart}">
              <i class="bi bi-cart3"></i> Carrito
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" th:href="@{/orders/history}">Mis Pedidos</a>
          </li>
          <sec:authorize access="hasRole('ADMIN')">
            <li class="nav-item">
              <a class="nav-link text-warning" th:href="@{/admin/dashboard}">
                <i class="bi bi-gear-fill"></i> Admin
              </a>
            </li>
          </sec:authorize>
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
              <i class="bi bi-person-circle"></i>
              <span sec:authentication="name"></span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end">
              <li>
                <form th:action="@{/auth/logout}" method="post">
                  <button class="dropdown-item text-danger" type="submit">
                    <i class="bi bi-box-arrow-right"></i> Cerrar sesión
                  </button>
                </form>
              </li>
            </ul>
          </li>
        </sec:authorize>
        <sec:authorize access="isAnonymous()">
          <li class="nav-item">
            <a class="btn btn-outline-light btn-sm" th:href="@{/auth/login}">Iniciar sesión</a>
          </li>
          <li class="nav-item">
            <a class="btn btn-primary btn-sm" th:href="@{/auth/register}">Registrarse</a>
          </li>
        </sec:authorize>
      </ul>
    </div>
  </div>
</nav>

<th:block th:fragment="head-includes">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</th:block>

<th:block th:fragment="scripts">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</th:block>

</body>
</html>
