<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<nav th:fragment="navbar" class="navbar-3market">
  <div class="container d-flex align-items-center gap-3">

    <a th:href="@{/home}" class="navbar-brand-3market me-2">
      <div class="text-center" style="position:relative;z-index:1">
        <img th:src="@{/images/logo_3market.png}" alt="3MARKET" width="100" height="100" class="auth-logo"/>
      </div>
    </a>

    <form th:action="@{/catalog}" method="get"
          class="search-wrapper d-none d-md-flex align-items-center flex-grow-1">
      <input type="text" name="search" class="form-control search-input"
             placeholder="Buscar productos..."/>
      <button type="submit" class="btn-search">
        <i class="bi bi-search" style="font-size:.9rem"></i>
      </button>
    </form>

    <div class="d-flex align-items-center gap-2 ms-auto">

      <a th:href="@{/catalog}" class="nav-link-3m d-none d-lg-block">Catálogo</a>

      <div th:if="${usuarioLogueado != null and ( #strings.contains(usuarioLogueado.roles, 'ADMIN') or #strings.contains(usuarioLogueado.roles, 'VENDEDOR') )}">
        <a th:href="@{/vendedor/products/new}" class="btn-register-product d-none d-md-flex align-items-center gap-1">
          <i class="bi bi-plus-circle-fill"></i> Registrar producto
        </a>
      </div>


      <div th:if="${usuarioLogueado != null and usuarioLogueado.roles == 'ROLE_ADMIN'}">
        <a th:href="@{/admin/dashboard}" class="btn-admin-link d-none d-md-flex align-items-center gap-1">
          <i class="bi bi-bar-chart-fill"></i> Informes
        </a>
      </div>

      <div th:if="${usuarioLogueado != null and usuarioLogueado.roles == 'ROLE_VENDEDOR'}">
        <a th:href="@{/vendedor/dashboard}" class="btn-admin-link d-none d-md-flex align-items-center gap-1">
          <i class="bi bi-bar-chart-fill"></i> Informes
        </a>
      </div>

      <div th:if="${usuarioLogueado != null and usuarioLogueado.roles == 'ROLE_CLIENTE'}" class="d-inline">
        <a th:href="@{/cart}" class="nav-icon-btn" title="Mi carrito">
          <i class="bi bi-cart3"></i>
        </a>
      </div>

      <div th:if="${usuarioLogueado != null and usuarioLogueado.roles == 'ROLE_CLIENTE'}" class="d-inline">
        <a th:href="@{/orders/history}" class="nav-link-3m d-none d-lg-block">Mis pedidos</a>
      </div>

      <div th:if="${usuarioLogueado != null}" class="dropdown">
        <button class="d-flex align-items-center gap-2 bg-transparent border-0 text-white"
                type="button" data-bs-toggle="dropdown" style="cursor:pointer">
          <div class="nav-avatar"><i class="bi bi-person-fill"></i></div>
          <span class="d-none d-md-inline" style="font-size:.85rem;color:#cdd5e0"
                th:text="${usuarioLogueado.username}"></span>
          <i class="bi bi-chevron-down" style="font-size:.75rem;color:#8899aa"></i>
        </button>
        <ul class="dropdown-menu dropdown-menu-end shadow border-0" style="border-radius:12px;min-width:180px">
          <li><h6 class="dropdown-header" th:text="${usuarioLogueado.username}"></h6></li>

          <li th:if="${usuarioLogueado != null and #strings.contains(usuarioLogueado.roles, 'CLIENTE')}">
            <a class="dropdown-item" th:href="@{/orders/history}">
              <i class="bi bi-bag-heart me-2 text-primary"></i>Mis pedidos
            </a>
          </li>

          <li th:if="${usuarioLogueado != null and ( #strings.contains(usuarioLogueado.roles, 'ADMIN') or #strings.contains(usuarioLogueado.roles, 'VENDEDOR') )}">
            <a class="dropdown-item" th:href="@{/vendedor/products}">
              <i class="bi bi-box-seam me-2 text-success"></i>Mis productos
            </a>
          </li>

          <li th:if="${usuarioLogueado != null and #strings.contains(usuarioLogueado.roles, 'ADMIN')}">
            <a class="dropdown-item" th:href="@{/admin/dashboard}">
              <i class="bi bi-speedometer2 me-2 text-warning"></i>Panel Admin
            </a>
          </li>

          <li th:if="${usuarioLogueado != null and #strings.contains(usuarioLogueado.roles, 'VENDEDOR')}">
            <a class="dropdown-item" th:href="@{/vendedor/dashboard}">
              <i class="bi bi-bar-chart-fill me-2 text-info"></i>Informes
            </a>
          </li>
          <li><hr class="dropdown-divider"/></li>
          <li>
            <form th:action="@{/auth/logout}" method="post">
              <button class="dropdown-item text-danger" type="submit">
                <i class="bi bi-box-arrow-right me-2"></i>Cerrar sesión
              </button>
            </form>
          </li>
        </ul>
      </div>

      <div th:if="${usuarioLogueado == null}">
        <a th:href="@{/auth/login}"
           class="btn btn-sm btn-outline-light rounded-pill px-3" style="font-size:.85rem">
          Iniciar sesión
        </a>
        <a th:href="@{/auth/register}"
           class="btn btn-sm rounded-pill px-3 text-white"
           style="background:var(--purple);font-size:.85rem">
          Registrarse
        </a>
      </div>

    </div>
  </div>
</nav>

<th:block th:fragment="head-includes">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</th:block>

<th:block th:fragment="scripts">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</th:block>

</body>
</html>
