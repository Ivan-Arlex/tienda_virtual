<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{fragments/nav :: head-includes}"/>
  <title>Iniciar Sesión - TiendaVirtual</title>
</head>
<body class="bg-light">

<th:block th:replace="~{fragments/nav :: navbar}"/>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h4 class="card-title text-center mb-4">
            <i class="bi bi-lock-fill text-primary"></i> Iniciar Sesión
          </h4>

          <div th:if="${param.error}" class="alert alert-danger">
            <i class="bi bi-exclamation-triangle-fill"></i> Usuario o contraseña incorrectos.
          </div>
          <div th:if="${param.logout}" class="alert alert-success">
            <i class="bi bi-check-circle-fill"></i> Sesión cerrada correctamente.
          </div>
          <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

          <form th:action="@{/auth/login}" method="post">
            <div class="mb-3">
              <label class="form-label">Usuario</label>
              <input type="text" name="username" class="form-control" placeholder="Ingresa tu usuario" required autofocus/>
            </div>
            <div class="mb-3">
              <label class="form-label">Contraseña</label>
              <input type="password" name="password" class="form-control" placeholder="Ingresa tu contraseña" required/>
            </div>
            <div class="d-grid mt-4">
              <button type="submit" class="btn btn-primary">
                <i class="bi bi-box-arrow-in-right"></i> Ingresar
              </button>
            </div>
          </form>

          <hr/>
          <p class="text-center mb-0 text-muted small">
            ¿No tienes cuenta?
            <a th:href="@{/auth/register}">Regístrate aquí</a>
          </p>
          <p class="text-center text-muted small mt-2">
            <strong>Demo:</strong> admin / admin123 &nbsp;|&nbsp; cliente1 / cliente123
          </p>
        </div>
      </div>
    </div>
  </div>
</div>

<th:block th:replace="~{fragments/nav :: scripts}"/>
</body>
</html>
