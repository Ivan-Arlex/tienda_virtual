<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <th:block th:replace="~{fragments/nav :: head-includes}"/>
  <title th:text="${product.name} + ' – 3Market'">Producto</title>
</head>
<body>

<th:block th:replace="~{fragments/nav :: navbar}"/>

<div class="container py-5">
  <nav aria-label="breadcrumb" class="mb-4">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a th:href="@{/home}" style="color:var(--blue)">Inicio</a></li>
      <li class="breadcrumb-item"><a th:href="@{/catalog}" style="color:var(--blue)">Catálogo</a></li>
      <li class="breadcrumb-item active text-muted" th:text="${product.name}"></li>
    </ol>
  </nav>

  <div class="panel-card">
    <div class="row g-0">
      <!-- Imagen -->
      <div class="col-md-5 d-flex align-items-center justify-content-center p-4"
           style="background:#f8fafc;border-right:1px solid var(--border);min-height:360px">
        <img th:if="${product.imageUrl != null and !product.imageUrl.isEmpty()}"
             th:src="${product.imageUrl}" class="img-fluid"
             style="max-height:320px;object-fit:contain" alt=""/>
        <i th:unless="${product.imageUrl != null and !product.imageUrl.isEmpty()}"
           class="bi bi-box-seam" style="font-size:7rem;color:#cbd5e1"></i>
      </div>

      <!-- Info -->
      <div class="col-md-7 p-4 p-md-5 d-flex flex-column">
        <span class="badge bg-secondary mb-2 w-fit"
              th:text="${product.categoryName != null ? product.categoryName : 'Sin categoría'}"></span>
        <h2 class="fw-bold mb-1" th:text="${product.name}"></h2>
        <p class="text-muted" th:text="${product.description}"></p>

        <div class="d-flex align-items-center gap-3 my-3">
          <span class="price-tag" style="font-size:2rem"
                th:text="${'$' + #numbers.formatDecimal(product.price, 1, 2)}"></span>
          <span class="badge badge-status"
                th:classappend="${product.stock > 0 ? 'bg-success' : 'bg-danger'}"
                th:text="${product.stock > 0 ? 'En stock (' + product.stock + ' disp.)' : 'Agotado'}"></span>
        </div>

        <sec:authorize access="hasRole('CLIENTE')">
          <form th:action="@{/cart/add}" method="post" class="d-flex gap-3 align-items-center mt-auto">
            <input type="hidden" name="productId" th:value="${product.id}"/>
            <div class="d-flex align-items-center gap-2">
              <label class="form-label mb-0 fw-semibold small">Cantidad:</label>
              <input type="number" name="quantity" class="form-control" style="width:80px"
                     value="1" min="1" th:max="${product.stock}"/>
            </div>
            <button type="submit" class="btn btn-primary-3m px-4 py-2"
                    th:disabled="${product.stock == 0}">
              <i class="bi bi-cart-plus me-1"></i>Agregar al carrito
            </button>
          </form>
        </sec:authorize>

        <sec:authorize access="isAnonymous()">
          <div class="alert alert-info mt-3 py-2" style="font-size:.88rem">
            <a th:href="@{/auth/login}" style="color:var(--blue);font-weight:600">Inicia sesión</a>
            para agregar productos al carrito.
          </div>
        </sec:authorize>

        <hr class="mt-4"/>
        <a th:href="@{/catalog}" class="btn btn-outline-secondary btn-sm w-fit">
          <i class="bi bi-arrow-left me-1"></i>Volver al catálogo
        </a>
      </div>
    </div>
  </div>
</div>

<footer class="footer-3m">
  <p class="mb-0">© 2026 <strong style="color:var(--teal)">3Market</strong> · Universidad del Pacífico</p>
</footer>

<th:block th:replace="~{fragments/nav :: scripts}"/>
</body>
</html>
