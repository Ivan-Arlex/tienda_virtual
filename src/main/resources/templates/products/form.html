<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{fragments/nav :: head-includes}"/>
  <title th:text="${productDto.id != null ? 'Editar' : 'Nuevo'} + ' Producto - Admin'">Producto</title>
</head>
<body>

<th:block th:replace="~{fragments/nav :: navbar}"/>

<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white fw-semibold">
          <i class="bi bi-box-seam"></i>
          <span th:text="${productDto.id != null ? 'Editar Producto' : 'Nuevo Producto'}"></span>
        </div>
        <div class="card-body">
          <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

          <form th:action="@{/admin/products/save}" method="post" th:object="${productDto}">
            <input type="hidden" th:field="*{id}"/>

            <div class="row g-3">
              <div class="col-md-8">
                <label class="form-label fw-semibold">Nombre del Producto *</label>
                <input type="text" th:field="*{name}" class="form-control" required
                       placeholder="Nombre descriptivo del producto"/>
              </div>
              <div class="col-md-4">
                <label class="form-label fw-semibold">Categoría *</label>
                <select th:field="*{categoryId}" class="form-select" required>
                  <option value="">-- Seleccionar --</option>
                  <option th:each="cat : ${categories}"
                          th:value="${cat.id}"
                          th:text="${cat.name}"></option>
                </select>
              </div>
              <div class="col-12">
                <label class="form-label fw-semibold">Descripción</label>
                <textarea th:field="*{description}" class="form-control" rows="3"
                          placeholder="Descripción detallada del producto"></textarea>
              </div>
              <div class="col-md-4">
                <label class="form-label fw-semibold">Precio *</label>
                <div class="input-group">
                  <span class="input-group-text">$</span>
                  <input type="number" th:field="*{price}" class="form-control"
                         step="0.01" min="0" required placeholder="0.00"/>
                </div>
              </div>
              <div class="col-md-4">
                <label class="form-label fw-semibold">Stock *</label>
                <input type="number" th:field="*{stock}" class="form-control"
                       min="0" required placeholder="Unidades disponibles"/>
              </div>
              <div class="col-md-4">
                <label class="form-label fw-semibold">Estado</label>
                <div class="form-check form-switch mt-2">
                  <input class="form-check-input" type="checkbox" th:field="*{active}"
                         role="switch" id="activeSwitch"/>
                  <label class="form-check-label" for="activeSwitch">Activo</label>
                </div>
              </div>
              <div class="col-12">
                <label class="form-label fw-semibold">URL de imagen (opcional)</label>
                <input type="url" th:field="*{imageUrl}" class="form-control"
                       placeholder="https://ejemplo.com/imagen.jpg"/>
              </div>
            </div>

            <div class="d-flex gap-2 mt-4">
              <button type="submit" class="btn btn-primary">
                <i class="bi bi-floppy-fill"></i> Guardar
              </button>
              <a th:href="@{/admin/products}" class="btn btn-outline-secondary">Cancelar</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<th:block th:replace="~{fragments/nav :: scripts}"/>
</body>
</html>
