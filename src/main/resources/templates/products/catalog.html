<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <th:block th:replace="~{fragments/nav :: head-includes}"/>
  <title>Catálogo - TiendaVirtual</title>
</head>
<body>

<th:block th:replace="~{fragments/nav :: navbar}"/>

<div class="container py-4">
  <div class="row">

    <!-- Sidebar de filtros -->
    <div class="col-md-3 mb-4">
      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white fw-semibold">
          <i class="bi bi-funnel-fill"></i> Filtrar
        </div>
        <div class="card-body">
          <form th:action="@{/catalog}" method="get">
            <div class="mb-3">
              <label class="form-label small fw-semibold">Buscar</label>
              <input type="text" name="search" class="form-control form-control-sm"
                     placeholder="Nombre del producto..." th:value="${search}"/>
            </div>
            <div class="mb-3">
              <label class="form-label small fw-semibold">Categoría</label>
              <div th:each="cat : ${categories}">
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="categoryId"
                         th:value="${cat.id}"
                         th:checked="${selectedCategory == cat.id}"
                         th:id="${'cat-' + cat.id}"/>
                  <label class="form-check-label small" th:for="${'cat-' + cat.id}"
                         th:text="${cat.name}"></label>
                </div>
              </div>
            </div>
            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-primary btn-sm">Aplicar</button>
              <a th:href="@{/catalog}" class="btn btn-outline-secondary btn-sm">Limpiar</a>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Lista de productos -->
    <div class="col-md-9">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0 fw-semibold">
          <span th:if="${search != null}">Resultados para: "<span th:text="${search}"></span>"</span>
          <span th:unless="${search != null}">Catálogo de Productos</span>
        </h4>
        <small class="text-muted" th:text="${#lists.size(products)} + ' productos'"></small>
      </div>

      <div class="row g-3">
        <div class="col-md-4" th:each="product : ${products}">
          <div class="card h-100 shadow-sm product-card">
            <div class="card-img-top bg-light d-flex align-items-center justify-content-center" style="height:160px">
              <img th:if="${product.imageUrl != null and !product.imageUrl.isEmpty()}"
                   th:src="${product.imageUrl}" class="img-fluid" style="max-height:140px; object-fit:contain" alt=""/>
              <i th:unless="${product.imageUrl != null and !product.imageUrl.isEmpty()}"
                 class="bi bi-box-seam fs-1 text-secondary"></i>
            </div>
            <div class="card-body d-flex flex-column">
              <span class="badge bg-secondary small" th:text="${product.categoryName}"></span>
              <h6 class="card-title fw-semibold mt-1" th:text="${product.name}"></h6>
              <p class="card-text text-muted small flex-grow-1"
                 th:text="${#strings.abbreviate(product.description, 70)}"></p>
              <div class="d-flex justify-content-between align-items-center">
                <span class="fw-bold text-primary"
                      th:text="${'$' + #numbers.formatDecimal(product.price, 1, 2)}"></span>
                <small class="text-muted" th:text="'Stock: ' + ${product.stock}"></small>
              </div>
            </div>
            <div class="card-footer bg-transparent border-0 d-flex gap-2">
              <a th:href="@{/products/{id}(id=${product.id})}"
                 class="btn btn-outline-primary btn-sm flex-grow-1">Detalle</a>
              <sec:authorize access="isAuthenticated()">
                <form th:action="@{/cart/add}" method="post">
                  <input type="hidden" name="productId" th:value="${product.id}"/>
                  <input type="hidden" name="quantity" value="1"/>
                  <button type="submit" class="btn btn-primary btn-sm"
                          th:disabled="${product.stock == 0}">
                    <i class="bi bi-cart-plus"></i>
                  </button>
                </form>
              </sec:authorize>
            </div>
          </div>
        </div>
      </div>

      <div th:if="${#lists.isEmpty(products)}" class="text-center py-5 text-muted">
        <i class="bi bi-search fs-1"></i>
        <p class="mt-2">No se encontraron productos.</p>
        <a th:href="@{/catalog}" class="btn btn-outline-primary btn-sm">Ver todos</a>
      </div>
    </div>
  </div>
</div>

<footer class="bg-dark text-white text-center py-3 mt-4">
  <p class="mb-0 small">© 2026 TiendaVirtual</p>
</footer>

<th:block th:replace="~{fragments/nav :: scripts}"/>
</body>
</html>
