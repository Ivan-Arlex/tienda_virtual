<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{fragments/nav :: head-includes}"/>
  <title>Productos - Admin</title>
</head>
<body>

<th:block th:replace="~{fragments/nav :: navbar}"/>

<div class="container-fluid py-4">
  <div class="row">
    <div class="col-md-2">
      <div class="list-group list-group-flush shadow-sm">
        <a th:href="@{/admin/dashboard}" class="list-group-item list-group-item-action">
          <i class="bi bi-speedometer2"></i> Dashboard
        </a>
        <a th:href="@{/admin/products}" class="list-group-item list-group-item-action active">
          <i class="bi bi-box-seam"></i> Productos
        </a>
        <a th:href="@{/admin/categories}" class="list-group-item list-group-item-action">
          <i class="bi bi-tags"></i> Categorías
        </a>
        <a th:href="@{/admin/orders}" class="list-group-item list-group-item-action">
          <i class="bi bi-bag-check"></i> Pedidos
        </a>
        <a th:href="@{/home}" class="list-group-item list-group-item-action text-secondary">
          <i class="bi bi-arrow-left"></i> Tienda
        </a>
      </div>
    </div>

    <div class="col-md-10">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-semibold mb-0">Gestión de Productos</h3>
        <a th:href="@{/admin/products/new}" class="btn btn-primary">
          <i class="bi bi-plus-lg"></i> Nuevo Producto
        </a>
      </div>

      <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
      <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>

      <div class="card shadow-sm">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-dark">
              <tr>
                <th>#</th>
                <th>Nombre</th>
                <th>Categoría</th>
                <th class="text-end">Precio</th>
                <th class="text-center">Stock</th>
                <th class="text-center">Estado</th>
                <th class="text-center">Acciones</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="product : ${products}">
                <td th:text="${product.id}"></td>
                <td class="fw-semibold" th:text="${product.name}"></td>
                <td>
  <span class="badge bg-secondary"
        th:text="${product.categoryName != null and !product.categoryName.isEmpty() ? product.categoryName : '-'}"></span>
                </td>
                <td class="text-end"
                    th:text="${'$' + #numbers.formatDecimal(product.price, 1, 2)}"></td>
                <td class="text-center">
                  <span class="badge"
                        th:classappend="${product.stock > 10 ? 'bg-success' : product.stock > 0 ? 'bg-warning text-dark' : 'bg-danger'}"
                        th:text="${product.stock}"></span>
                </td>
                <td class="text-center">
                  <span class="badge"
                        th:classappend="${product.active ? 'bg-success' : 'bg-secondary'}"
                        th:text="${product.active ? 'Activo' : 'Inactivo'}"></span>
                </td>
                <td class="text-center">
                  <div class="d-flex gap-1 justify-content-center">
                    <a th:href="@{/admin/products/{id}/edit(id=${product.id})}"
                       class="btn btn-sm btn-outline-primary" title="Editar">
                      <i class="bi bi-pencil-fill"></i>
                    </a>
                    <form th:action="@{/admin/products/{id}/toggle(id=${product.id})}" method="post">
                      <button type="submit" class="btn btn-sm"
                              th:classappend="${product.active ? 'btn-outline-warning' : 'btn-outline-success'}"
                              th:title="${product.active ? 'Desactivar' : 'Activar'}">
                        <i th:classappend="${product.active ? 'bi bi-toggle-on' : 'bi bi-toggle-off'}"></i>
                      </button>
                    </form>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<th:block th:replace="~{fragments/nav :: scripts}"/>
</body>
</html>
