<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{fragments/nav :: head-includes}"/>
  <title>Checkout - TiendaVirtual</title>
</head>
<body>

<th:block th:replace="~{fragments/nav :: navbar}"/>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-7">
      <h3 class="fw-semibold mb-4"><i class="bi bi-bag-check-fill text-success"></i> Confirmar Pedido</h3>

      <div class="card shadow-sm mb-4">
        <div class="card-body">
          <h5 class="fw-semibold mb-3">Datos del comprador</h5>
          <p class="mb-1"><strong>Nombre:</strong> <span th:text="${users.fullName}"></span></p>
          <p class="mb-1"><strong>Usuario:</strong> <span th:text="${users.username}"></span></p>
          <p class="mb-0"><strong>Email:</strong> <span th:text="${users.email}"></span></p>
        </div>
      </div>

      <div class="card shadow-sm mb-4">
        <div class="card-body">
          <h5 class="fw-semibold mb-3">Método de pago simulado</h5>
          <p class="text-muted small mb-3">
            Selecciona un método de pago. La transacción es completamente simulada.
          </p>
          <div class="row g-2" id="paymentMethods">
            <div class="col-4">
              <div class="border rounded p-3 text-center payment-option active-payment" data-method="TARJETA_CREDITO">
                <i class="bi bi-credit-card-fill fs-3 text-primary"></i>
                <div class="small mt-1">Tarjeta Crédito</div>
              </div>
            </div>
            <div class="col-4">
              <div class="border rounded p-3 text-center payment-option" data-method="TARJETA_DEBITO">
                <i class="bi bi-credit-card fs-3 text-success"></i>
                <div class="small mt-1">Tarjeta Débito</div>
              </div>
            </div>
            <div class="col-4">
              <div class="border rounded p-3 text-center payment-option" data-method="TRANSFERENCIA">
                <i class="bi bi-bank fs-3 text-warning"></i>
                <div class="small mt-1">Transferencia</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <form th:action="@{/orders/place}" method="post">
        <div class="d-grid gap-2">
          <button type="submit" class="btn btn-success btn-lg">
            <i class="bi bi-check-circle-fill"></i> Confirmar Pedido
          </button>
          <a th:href="@{/cart}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Volver al carrito
          </a>
        </div>
      </form>
    </div>
  </div>
</div>

<footer class="bg-dark text-white text-center py-3 mt-4">
  <p class="mb-0 small">© 2026 TiendaVirtual</p>
</footer>

<th:block th:replace="~{fragments/nav :: scripts}"/>
<script>
document.querySelectorAll('.payment-option').forEach(el => {
  el.style.cursor = 'pointer';
  el.addEventListener('click', () => {
    document.querySelectorAll('.payment-option').forEach(e => e.classList.remove('active-payment'));
    el.classList.add('active-payment');
  });
});
</script>
<style>
.active-payment { border-color: #0d6efd !important; background: #f0f4ff; }
.payment-option:hover { border-color: #adb5bd; cursor: pointer; }
</style>
</body>
</html>
